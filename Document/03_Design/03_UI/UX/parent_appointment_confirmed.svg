<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 800" width="400" height="800">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
      text { font-family: 'Inter', sans-serif; }
      .bg { fill: #f8fafc; }
      .primary { fill: #0ea5e9; }
      .card { fill: #ffffff; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.05)); }
      .text-main { fill: #0f172a; }
      .text-sub { fill: #64748b; }
      .success-bg { fill: #dcfce7; }
      .success-icon { fill: #166534; }
      .dashed { stroke: #cbd5e1; stroke-width: 2; stroke-dasharray: 6 6; }
    </style>
  </defs>

  <rect class="bg" width="400" height="800" />
  
  <rect class="primary" width="400" height="200" />
  <circle cx="200" cy="180" r="40" class="success-bg" />
  <path d="M188 180 l8 8 l20 -20" stroke="#166534" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none" />

  <text x="200" y="250" class="text-main" style="font-weight: 700; font-size: 20px;" text-anchor="middle">Đặt Lịch Thành Công!</text>
  <text x="200" y="275" class="text-sub" style="font-size: 14px;" text-anchor="middle">Bạn đã đặt chỗ trên hệ thống của HCMS.</text>

  <!-- Ticket Card -->
  <rect x="20" y="310" width="360" height="340" rx="16" class="card" />
  
  <text x="200" y="350" class="text-main" style="font-weight: 600; font-size: 16px;" text-anchor="middle">Mã Lịch Khám</text>
  <text x="200" y="380" class="primary" style="font-weight: 700; font-size: 24px; letter-spacing: 2px;" text-anchor="middle">APT-8820A</text>

  <line x1="20" y1="410" x2="380" y2="410" class="dashed" />

  <text x="40" y="440" class="text-sub" style="font-size: 13px;">Bệnh nhi</text>
  <text x="40" y="460" class="text-main" style="font-weight: 600; font-size: 15px;">Bé Trần Văn A</text>

  <text x="220" y="440" class="text-sub" style="font-size: 13px;">Bác sĩ phụ trách</text>
  <text x="220" y="460" class="text-main" style="font-weight: 600; font-size: 15px;">BS. Minh</text>

  <text x="40" y="500" class="text-sub" style="font-size: 13px;">Thời gian</text>
  <text x="40" y="520" class="text-main" style="font-weight: 600; font-size: 15px;">Thứ Tư, 15/06/2026</text>
  <text x="40" y="540" class="text-main" style="font-weight: 600; font-size: 15px;">08:30 Sáng</text>

  <!-- Dummy QR Code -->
  <rect x="250" y="500" width="90" height="90" rx="8" class="bg" stroke="#cbd5e1" stroke-width="1" />
  <rect x="260" y="510" width="70" height="70" fill="#0f172a" />
  <rect x="265" y="515" width="20" height="20" fill="white" />
  <rect x="265" y="555" width="20" height="20" fill="white" />
  <rect x="305" y="515" width="20" height="20" fill="white" />

  <text x="200" y="620" class="text-sub" style="font-size: 12px; font-style: italic;" text-anchor="middle">Vui lòng đưa mã này cho lễ tân khi tới.</text>

  <!-- Action Buttons -->
  <rect x="20" y="690" width="170" height="50" rx="12" class="primary" opacity="0.1" />
  <text x="105" y="720" class="primary" style="font-weight: 600; font-size: 15px;" text-anchor="middle">Lưu vào Lịch</text>

  <rect x="210" y="690" width="170" height="50" rx="12" class="primary" />
  <text x="295" y="720" style="fill: white; font-weight: 600; font-size: 15px;" text-anchor="middle">Về Trang chủ</text>

</svg>
