<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 800" width="400" height="800">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
      text { font-family: 'Inter', sans-serif; }
      .bg { fill: #f8fafc; }
      .card { fill: #ffffff; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.05)); }
      .primary { fill: #0ea5e9; }
      .text-main { fill: #0f172a; }
      .text-sub { fill: #64748b; }
      .divider { stroke: #e2e8f0; stroke-width: 1; stroke-dasharray: 4 4; }
    </style>
  </defs>

  <rect class="bg" width="400" height="800" />
  
  <!-- Header App Bar -->
  <rect class="card" width="400" height="80" />
  <text x="20" y="50" class="text-main" style="font-weight: 600; font-size: 24px;">←</text>
  <text x="60" y="48" class="text-main" style="font-weight: 700; font-size: 18px;">Chi tiết Khám bệnh</text>

  <!-- Title Section -->
  <text x="20" y="115" class="text-sub" style="font-size: 13px;">Ngày 12 Tháng 03, 2026</text>
  <text x="20" y="140" class="text-main" style="font-weight: 700; font-size: 20px;">Viêm họng cấp (J02.9)</text>
  <text x="20" y="165" class="text-main" style="font-weight: 500; font-size: 15px;">Bác sĩ: BS. Minh</text>
  
  <rect x="300" y="140" width="70" height="24" rx="12" class="bg" stroke="#0ea5e9" stroke-width="1" />
  <text x="312" y="157" class="primary" style="font-weight: 600; font-size: 12px;">Đã Khám</text>

  <!-- Clinical Notes (Dặn dò lâm sàng) -->
  <rect x="20" y="200" width="360" height="150" rx="12" class="card" />
  <rect x="20" y="200" width="360" height="40" rx="12" class="bg" />
  <rect x="20" y="230" width="360" height="10" fill="#f8fafc" /> <!-- hiding bottom corners -->
  <line x1="20" y1="240" x2="380" y2="240" class="divider" />
  
  <text x="35" y="225" class="text-main" style="font-weight: 600; font-size: 14px;">Lời Dặn Của Bác Sĩ (Clinical Notes)</text>
  
  <text x="35" y="270" class="text-main" style="font-size: 14px;">- Họng có mủ nhẹ, sốt về chiều.</text>
  <text x="35" y="295" class="text-main" style="font-size: 14px;">- Cho bé uống nhiều nước ấm.</text>
  <text x="35" y="320" class="text-main" style="font-size: 14px;">- Nghỉ ngơi tại nhà, tránh gió lạnh trực tiếp.</text>

  <!-- Prescription (Đơn thuốc) -->
  <rect x="20" y="370" width="360" height="260" rx="12" class="card" />
  <rect x="20" y="370" width="360" height="40" rx="12" class="bg" />
  <rect x="20" y="400" width="360" height="10" fill="#f8fafc" />
  <line x1="20" y1="410" x2="380" y2="410" class="divider" />
  
  <text x="35" y="395" class="text-main" style="font-weight: 600; font-size: 14px;">Đơn Thuốc (e-Prescription)</text>

  <!-- Drug 1 -->
  <text x="35" y="445" class="primary" style="font-weight: 700; font-size: 15px;">1. Hapacol 150mg (Gói)</text>
  <text x="320" y="445" class="text-main" style="font-weight: 600; font-size: 14px;">10 Gói</text>
  <text x="35" y="470" class="text-sub" style="font-size: 13px;">Liều dùng: Uống 1 gói khi sốt trên 38.5 độ C.</text>
  <text x="35" y="490" class="text-sub" style="font-size: 13px;">Khoảng cách: Cấp nhau ít nhất 4-6 tiếng.</text>

  <line x1="35" y1="515" x2="365" y2="515" class="divider" />

  <!-- Drug 2 -->
  <text x="35" y="550" class="primary" style="font-weight: 700; font-size: 15px;">2. Oresol 27.9g (Gói)</text>
  <text x="320" y="550" class="text-main" style="font-weight: 600; font-size: 14px;">5 Gói</text>
  <text x="35" y="575" class="text-sub" style="font-size: 13px;">Liều dùng: Pha 1 gói với đúng 1 Lít nước đun sôi.</text>
  <text x="35" y="595" class="text-sub" style="font-size: 13px;">Khuyên dùng: Uống rải rác thay nước lọc trong ngày.</text>

  <!-- Download Invoice Button -->
  <rect x="20" y="660" width="360" height="50" rx="12" class="primary" opacity="0.1" stroke="#0ea5e9" stroke-width="1"/>
  <text x="200" y="690" class="primary" style="font-weight: 700; font-size: 15px;" text-anchor="middle">Tải Hóa đơn (Billing Invoice) PDF</text>

</svg>
