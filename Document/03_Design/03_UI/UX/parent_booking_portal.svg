<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 800" width="400" height="800">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
      text { font-family: 'Inter', sans-serif; }
      .bg { fill: #f8fafc; }
      .card { fill: #ffffff; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.05)); }
      .primary { fill: #0ea5e9; }
      .secondary { fill: #e0f2fe; }
      .text-main { fill: #0f172a; }
      .text-sub { fill: #64748b; }
      .accent { fill: #f59e0b; }
      .input-bg { fill: #f1f5f9; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect class="bg" width="400" height="800" rx="24" />
  
  <!-- Header -->
  <rect class="primary" width="400" height="180" rx="24" />
  <rect class="primary" width="400" height="24" y="156" /> <!-- Hide bottom rounding -->
  <text x="32" y="80" class="text-main" style="fill: white; font-weight: 700; font-size: 24px;">HCMS Booking</text>
  <text x="32" y="110" class="text-main" style="fill: rgba(255,255,255,0.8); font-size: 14px;">Khoa Nhi - Đặt lịch khám nhanh</text>
  
  <!-- Avatar / Context -->
  <circle cx="340" cy="74" r="20" fill="white" opacity="0.2" />
  <text x="333" y="80" style="fill: white; font-size: 16px; font-weight: 600;">V</text>

  <!-- Main Booking Card -->
  <rect x="20" y="140" width="360" height="630" rx="16" class="card" />

  <!-- Step 1: Select Doctor -->
  <text x="40" y="180" class="text-main" style="font-weight: 600; font-size: 16px;">1. Chọn Bác sĩ</text>
  
  <!-- Doctor 1 -->
  <rect x="40" y="200" width="320" height="70" rx="12" class="input-bg" stroke="#cbd5e1" stroke-width="1"/>
  <circle cx="70" cy="235" r="20" class="secondary" />
  <text x="100" y="230" class="text-main" style="font-weight: 600; font-size: 14px;">BS. Minh</text>
  <text x="100" y="250" class="text-sub" style="font-size: 12px;">Trưởng khoa Nhi - 15 năm KN</text>
  <circle cx="330" cy="235" r="10" fill="white" stroke="#0ea5e9" stroke-width="6"/>
  
  <!-- Doctor 2 -->
  <rect x="40" y="280" width="320" height="70" rx="12" class="input-bg" />
  <circle cx="70" cy="315" r="20" fill="#e2e8f0" />
  <text x="100" y="310" class="text-main" style="font-weight: 600; font-size: 14px;">BS. Hoàng</text>
  <text x="100" y="330" class="text-sub" style="font-size: 12px;">Chuyên khoa Hô hấp</text>

  <!-- Step 2: Time Slot -->
  <text x="40" y="390" class="text-main" style="font-weight: 600; font-size: 16px;">2. Chọn Giờ Khám</text>
  
  <!-- Date Selector -->
  <text x="40" y="420" class="text-sub" style="font-size: 12px; font-weight: 500;">Thứ Tư, 15/06/2026</text>
  
  <!-- Slots -->
  <rect x="40" y="440" width="100" height="40" rx="8" class="primary" />
  <text x="65" y="465" style="fill: white; font-size: 14px; font-weight: 600;">08:30</text>
  
  <rect x="150" y="440" width="100" height="40" rx="8" class="input-bg" />
  <text x="175" y="465" class="text-main" style="font-size: 14px; font-weight: 500;">09:00</text>
  
  <rect x="260" y="440" width="100" height="40" rx="8" class="input-bg" />
  <text x="285" y="465" class="text-main" style="font-size: 14px; font-weight: 500;">09:30</text>
  
  <rect x="40" y="490" width="100" height="40" rx="8" class="bg" stroke="#e2e8f0" stroke-width="1" opacity="0.5"/>
  <text x="65" y="515" class="text-sub" style="font-size: 14px; font-weight: 500;">10:00</text>
  <line x1="45" y1="510" x2="135" y2="510" stroke="#94a3b8" stroke-width="2" />

  <!-- Step 3: Demographics -->
  <text x="40" y="560" class="text-main" style="font-weight: 600; font-size: 16px;">3. Thông tin Bệnh nhi</text>
  
  <!-- Input fields -->
  <rect x="40" y="580" width="320" height="40" rx="6" stroke="#cbd5e1" stroke-width="1" class="card" />
  <text x="50" y="605" class="text-sub" style="font-size: 13px;">Họ tên bé...</text>
  
  <rect x="40" y="630" width="155" height="40" rx="6" stroke="#cbd5e1" stroke-width="1" class="card" />
  <text x="50" y="655" class="text-sub" style="font-size: 13px;">Ngày sinh...</text>

  <rect x="205" y="630" width="155" height="40" rx="6" stroke="#cbd5e1" stroke-width="1" class="card" />
  <text x="215" y="655" class="text-sub" style="font-size: 13px;">Triệu chứng (tùy chọn)...</text>

  <!-- Submit CTA -->
  <rect x="40" y="700" width="320" height="50" rx="12" class="primary" />
  <text x="120" y="730" style="fill: white; font-weight: 700; font-size: 16px;">Xác nhận Đặt lịch</text>

</svg>
