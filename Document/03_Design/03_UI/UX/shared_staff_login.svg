<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" width="1280" height="800">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
      text { font-family: 'Inter', sans-serif; }
      .bg { fill: #f8fafc; }
      .brandBg { fill: #0d9488; }
      .card { fill: #ffffff; filter: drop-shadow(0 10px 25px rgba(0,0,0,0.1)); }
      .text-main { fill: #0f172a; }
      .text-sub { fill: #64748b; }
      .input-bg { fill: #f1f5f9; }
      .primary { fill: #0ea5e9; }
    </style>
  </defs>

  <!-- Split Screen Background -->
  <rect class="bg" width="640" height="800" />
  <rect x="640" class="brandBg" width="640" height="800" />
  
  <!-- Right Side Abstract Art (Brand side) -->
  <circle cx="960" cy="400" r="220" fill="white" opacity="0.1" />
  <circle cx="1160" cy="200" r="150" fill="white" opacity="0.05" />
  <text x="750" y="380" style="fill: white; font-weight: 700; font-size: 48px;">HCMS.</text>
  <text x="750" y="420" style="fill: rgba(255,255,255,0.8); font-size: 20px;">Healthcare Clinic Management System</text>
  <text x="750" y="450" style="fill: rgba(255,255,255,0.8); font-size: 16px;">Tinh gọn - Chuyên nghiệp - Minh bạch</text>

  <!-- Left Side Login Form -->
  <rect x="120" y="160" width="400" height="480" rx="20" class="card" />
  
  <circle cx="320" cy="220" r="30" class="input-bg" />
  <text x="312" y="228" style="fill: #0d9488; font-weight: 700; font-size: 24px;">H</text>

  <text x="320" y="280" class="text-main" style="font-weight: 700; font-size: 24px;" text-anchor="middle">Welcome Back</text>
  <text x="320" y="305" class="text-sub" style="font-size: 15px;" text-anchor="middle">Đăng nhập tài khoản Nhân sự (Staff)</text>

  <!-- Login Form Fields -->
  <text x="160" y="360" class="text-main" style="font-weight: 600; font-size: 14px;">Tài khoản / Số điện thoại</text>
  <rect x="160" y="370" width="320" height="45" rx="8" class="input-bg" stroke="#cbd5e1" stroke-width="1" />
  <text x="180" y="398" class="text-main" style="font-size: 15px;">bs.minh@hcms.com</text>

  <text x="160" y="440" class="text-main" style="font-weight: 600; font-size: 14px;">Mật khẩu</text>
  <rect x="160" y="450" width="320" height="45" rx="8" class="input-bg" stroke="#cbd5e1" stroke-width="1" />
  <text x="180" y="478" class="text-main" style="font-size: 20px;">••••••••</text>
  <text x="400" y="440" class="primary" style="font-size: 13px; font-weight: 600;">Quên mật khẩu?</text>

  <!-- Submit Button -->
  <rect x="160" y="520" width="320" height="50" rx="8" class="brandBg" />
  <text x="320" y="550" style="fill: white; font-weight: 700; font-size: 16px;" text-anchor="middle">Đăng nhập ngay</text>
  
  <text x="320" y="600" class="text-sub" style="font-size: 12px;" text-anchor="middle">Gặp vấn đề bảo mật? Liên hệ Admin mạng nội bộ.</text>

</svg>
