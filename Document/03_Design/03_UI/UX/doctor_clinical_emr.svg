<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" width="1280" height="800">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
      text { font-family: 'Inter', sans-serif; }
      .bg { fill: #f8fafc; }
      .sidebar { fill: #0f172a; } /* Dark slate */
      .card { fill: #ffffff; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.06)); }
      .accent { fill: #0d9488; } /* Clinical teal */
      .accent-light { fill: #ccfbf1; }
      .text-main { fill: #1e293b; }
      .text-sub { fill: #64748b; }
      .border { fill: #e2e8f0; }
      .input-bg { fill: #f1f5f9; }
      .badge-red { fill: #fee2e2; }
      .badge-red-text { fill: #991b1b; font-weight: 600; font-size: 13px; }
      .autocomplete { fill: #ffffff; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1)); }
    </style>
  </defs>

  <!-- Background Canvas -->
  <rect class="bg" width="1280" height="800" />

  <!-- Sidebar -->
  <rect class="sidebar" width="90" height="800" />
  <circle cx="45" cy="50" r="16" class="accent" />
  <text x="36" y="56" style="fill: white; font-weight: 700; font-size: 18px;">H</text>
  
  <rect x="0" y="100" width="4" height="60" class="accent" />
  <rect x="20" y="110" width="50" height="40" rx="8" class="accent" opacity="0.2" />
  <!-- Icons placeholders -->
  <circle cx="45" cy="130" r="10" fill="#0d9488" />
  <circle cx="45" cy="200" r="10" fill="#475569" />
  <circle cx="45" cy="270" r="10" fill="#475569" />

  <circle cx="45" cy="740" r="18" fill="#e2e8f0" />
  <text x="36" y="745" style="fill: #0f172a; font-weight: 700; font-size: 13px;">BS</text>

  <!-- Left Column: Patient EMR Profile (UC-11 / UC-14) -->
  <rect x="120" y="30" width="400" height="740" rx="16" class="card" />
  
  <!-- Profile Header -->
  <circle cx="170" cy="80" r="30" class="accent-light" />
  <text x="157" y="87" style="fill: #0d9488; font-weight: 700; font-size: 20px;">C</text>
  <text x="220" y="75" class="text-main" style="font-weight: 700; font-size: 22px;">Bé Nguyễn C.</text>
  <text x="220" y="95" class="text-sub" style="font-size: 14px;">6 Tuổi • Nam • Nặng 22kg</text>

  <!-- Vital Tags Section (UC-14) -->
  <rect x="150" y="130" width="340" height="100" rx="8" fill="#fffbeb" stroke="#fef3c7" stroke-width="2"/>
  <text x="170" y="160" style="fill: #92400e; font-weight: 600; font-size: 14px;">Vital Profile / Dấu hiệu Y tế</text>
  <text x="440" y="160" style="fill: #0d9488; font-size: 13px; font-weight: 600;">[ Edit ]</text>
  
  <text x="170" y="195" style="fill: #92400e; font-weight: 600; font-size: 13px;">Dị ứng:</text>
  <rect x="230" y="180" width="60" height="22" rx="4" class="badge-red" />
  <text x="240" y="195" class="badge-red-text">Lactose</text>
  
  <text x="170" y="215" style="fill: #92400e; font-weight: 600; font-size: 13px;">Nhóm máu:</text>
  <text x="250" y="215" style="fill: #92400e; font-size: 13px;">O+</text>

  <!-- History Timeline (UC-11) -->
  <text x="150" y="270" class="text-main" style="font-weight: 700; font-size: 16px;">Lịch sử Bệnh án (EMR)</text>
  
  <circle cx="160" cy="310" r="5" class="accent" />
  <line x1="160" y1="320" x2="160" y2="380" stroke="#cbd5e1" stroke-width="2" />
  <text x="180" y="305" class="text-main" style="font-weight: 600; font-size: 14px;">Hôm nay, 09:30 (Đang khám)</text>
  <text x="180" y="325" class="text-sub" style="font-size: 13px;">Khai báo: Đau bụng âm ỉ, nôn trớ sau ăn.</text>

  <circle cx="160" cy="390" r="5" fill="#94a3b8" />
  <text x="180" y="385" class="text-main" style="font-weight: 500; font-size: 14px;">12/03/2026</text>
  <text x="180" y="405" class="text-sub" style="font-size: 13px;">Khám: Viêm họng cấp (J02.9). BS. Minh</text>

  <!-- Right Column: Consultation Input (UC-12 & UC-13) -->
  <rect x="550" y="30" width="690" height="740" rx="16" class="card" />
  
  <!-- Section 1: Record VISIT -->
  <path d="M550,46 Q550,30 566,30 L1224,30 Q1240,30 1240,46 L1240,80 L550,80 Z" fill="#f8fafc" />
  <text x="580" y="65" class="text-main" style="font-weight: 700; font-size: 18px;">Ghi nhận Lâm sàng (VISIT)</text>
  <line x1="550" y1="80" x2="1240" y2="80" class="border" stroke-width="1" />

  <text x="580" y="120" class="text-main" style="font-weight: 600; font-size: 14px;">Chẩn đoán (ICD-10)</text>
  <rect x="580" y="130" width="630" height="44" rx="8" class="input-bg" stroke="#cbd5e1" stroke-width="1" />
  <text x="600" y="157" class="text-main" style="font-size: 14px;">Viêm dạ dày ruột cấp (A09)</text>

  <text x="580" y="210" class="text-main" style="font-weight: 600; font-size: 14px;">Ghi chú Lâm sàng &amp; Dặn dò</text>
  <rect x="580" y="220" width="630" height="100" rx="8" class="input-bg" stroke="#cbd5e1" stroke-width="1" />
  <text x="600" y="245" class="text-main" style="font-size: 14px;">- Bụng mềm, ấn đau tức thượng vị nhẹ.</text>
  <text x="600" y="270" class="text-main" style="font-size: 14px;">- Tuân thủ ăn chín uống sôi, không uống sữa bò tạm thời.</text>
  
  <rect x="1050" y="335" width="160" height="40" rx="6" class="accent" />
  <text x="1080" y="360" style="fill: white; font-weight: 600; font-size: 14px;">Save &amp; Finalize</text>

  <!-- Section 2: e-Prescription with Autocomplete -->
  <rect x="580" y="400" width="630" height="340" rx="12" class="bg" stroke="#e2e8f0" stroke-width="1"/>
  <text x="600" y="440" class="text-main" style="font-weight: 700; font-size: 16px;">Kê đơn thuốc điện tử (e-Prescription)</text>

  <!-- Input Row 1 -->
  <text x="600" y="480" class="text-sub" style="font-weight: 500; font-size: 13px;">Tên thuốc</text>
  <rect x="600" y="490" width="280" height="40" rx="6" fill="#fff" stroke="#94a3b8" stroke-width="2" />
  <text x="615" y="515" class="text-main" style="font-size: 14px;">Oresol</text>
  <line x1="662" y1="495" x2="662" y2="525" stroke="#0d9488" stroke-width="2" /> <!-- cursor blink -->

  <!-- Autocomplete Dropdown overlay -->
  <rect x="600" y="535" width="280" height="85" rx="6" class="autocomplete" />
  <rect x="600" y="535" width="280" height="40" rx="6" class="accent-light" />
  <text x="615" y="560" class="text-main" style="font-weight: 600; font-size: 14px;">Oresol 27.9g (Gói)</text>
  <text x="615" y="600" class="text-main" style="font-weight: 400; font-size: 14px;">Oresol 245 Hương cam</text>

  <!-- Input Row 1 - details -->
  <text x="900" y="480" class="text-sub" style="font-weight: 500; font-size: 13px;">Liều lượng</text>
  <rect x="900" y="490" width="100" height="40" rx="6" fill="#fff" stroke="#cbd5e1" stroke-width="1" />
  <text x="915" y="515" class="text-sub" style="font-size: 14px;">Số lượng...</text>

  <rect x="1010" y="490" width="180" height="40" rx="6" fill="#fff" stroke="#cbd5e1" stroke-width="1" />
  <text x="1025" y="515" class="text-sub" style="font-size: 14px;">Tần suất...</text>
  
  <!-- Add button -->
  <text x="600" y="660" style="fill: #0d9488; font-weight: 600; font-size: 14px;">+ Thêm thuốc</text>

  <!-- Submit Prescriptions (WF-03 connection) -->
  <rect x="990" y="680" width="200" height="40" rx="6" class="accent" />
  <text x="1015" y="705" style="fill: white; font-weight: 600; font-size: 14px;">Phát hành Đơn &amp; Hóa đơn</text>

</svg>
