<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" width="1280" height="800">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
      text { font-family: 'Inter', sans-serif; }
      .bg { fill: #f1f5f9; }
      .overlay { fill: #334155; opacity: 0.6; }
      .card { fill: #ffffff; filter: drop-shadow(0 20px 25px rgba(0,0,0,0.15)); }
      .primary { fill: #0ea5e9; }
      .accent { fill: #0d9488; }
      .text-main { fill: #0f172a; }
      .text-sub { fill: #64748b; }
      .input-bg { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1; }
      .border { stroke: #e2e8f0; stroke-width: 1; }
    </style>
  </defs>

  <!-- Background (Dashboard behind it) -->
  <rect width="1280" height="800" class="bg" />
  
  <!-- Dimmed Overlay -->
  <rect width="1280" height="800" class="overlay" />

  <!-- Pop-up Modal Form -->
  <rect x="340" y="80" width="600" height="640" rx="16" class="card" />

  <!-- Modal Header -->
  <text x="380" y="130" class="text-main" style="font-weight: 700; font-size: 24px;">Đăng ký Khám trực tiếp (Walk-in)</text>
  <text x="380" y="155" class="text-sub" style="font-size: 14px;">Tạo hồ sơ và xếp số ngay cho bệnh nhi không đặt lịch trước.</text>

  <!-- Section: Phone lookup -->
  <text x="380" y="210" class="text-main" style="font-weight: 600; font-size: 14px;">1. Tìm kiếm / Nhập thông tin Phụ huynh</text>
  
  <rect x="380" y="220" width="370" height="40" rx="6" class="input-bg" />
  <text x="395" y="245" class="text-main" style="font-size: 14px;">Nhập số điện thoại (VD: 09...)</text>
  <rect x="760" y="220" width="140" height="40" rx="6" class="primary" />
  <text x="830" y="245" style="fill: white; font-weight: 600; font-size: 14px;" text-anchor="middle">🔎 Tra cứu</text>

  <!-- Section: Pat Demographics -->
  <line x1="380" y1="290" x2="900" y2="290" class="border" />
  
  <text x="380" y="325" class="text-main" style="font-weight: 600; font-size: 14px;">2. Thông tin Bệnh nhi</text>
  
  <text x="380" y="355" class="text-sub" style="font-weight: 500; font-size: 13px;">Họ và Tên bé</text>
  <rect x="380" y="365" width="320" height="40" rx="6" class="input-bg" />
  
  <text x="730" y="355" class="text-sub" style="font-weight: 500; font-size: 13px;">Năm Sinh</text>
  <rect x="730" y="365" width="170" height="40" rx="6" class="input-bg" />

  <text x="380" y="435" class="text-sub" style="font-weight: 500; font-size: 13px;">Lý do đến khám (Triệu chứng)</text>
  <rect x="380" y="445" width="520" height="60" rx="6" class="input-bg" />

  <!-- Section: Assign Doctor -->
  <line x1="380" y1="535" x2="900" y2="535" class="border" />

  <text x="380" y="570" class="text-main" style="font-weight: 600; font-size: 14px;">3. Xếp phòng / Chọn Bác sĩ đang trực</text>
  
  <rect x="380" y="585" width="250" height="45" rx="8" class="primary" opacity="0.1" stroke="#0ea5e9" stroke-width="2" />
  <circle cx="410" cy="607" r="15" fill="#0ea5e9" />
  <text x="440" y="605" class="primary" style="font-weight: 600; font-size: 14px;">BS. Minh</text>
  <text x="440" y="620" class="text-sub" style="font-size: 12px;">(Đang rảnh. Queue: 0)</text>

  <rect x="650" y="585" width="250" height="45" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1" />
  <circle cx="680" cy="607" r="15" fill="#94a3b8" />
  <text x="710" y="605" class="text-main" style="font-weight: 600; font-size: 14px;">BS. Hoàng</text>
  <text x="710" y="620" class="text-sub" style="font-size: 12px;">(Đang khám. Queue: 3)</text>

  <!-- Submit Buttons -->
  <rect x="380" y="660" width="120" height="45" rx="6" fill="#f1f5f9" />
  <text x="440" y="688" class="text-sub" style="font-weight: 600; font-size: 15px;" text-anchor="middle">Hủy</text>

  <rect x="520" y="660" width="380" height="45" rx="6" class="accent" />
  <text x="710" y="688" style="fill: white; font-weight: 700; font-size: 15px;" text-anchor="middle">Đăng ký &amp; Cấp số thứ tự ưu tiên</text>

</svg>
