services:
  # 1. Backend Service (Spring Boot)
  - type: web
    name: hcms-backend
    env: docker
    dockerContext: ./Developments/BE
    dockerfilePath: Dockerfile
    plan: starter
    region: singapore
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SPRING_FLYWAY_ENABLED
        value: "true"
      - key: HIBERNATE_DDL_AUTO
        value: "none"
      - key: JWT_SECRET
        sync: false # Should be set in Render Dashboard or generateValue: true
      - key: DB_USERNAME
        value: avnadmin
      - key: DB_PASSWORD
        sync: false # Set this in Render Dashboard for security
      - key: DB_URL
        value: jdbc:mysql://mysql-1a4b8591-nguyendangkhoa5104-e33c.c.aivencloud.com:23979/defaultdb?useSSL=true&serverTimezone=UTC

  # 2. Frontend Service (React)
  - type: web
    name: hcms-frontend
    env: docker
    dockerContext: ./Developments/FE/FE_2
    dockerfilePath: Dockerfile
    plan: starter
    region: singapore
    envVars:
      - key: VITE_API_BASE_URL
        value: https://hcms-healthcare-clinic-system.onrender.com/api/v1
