services:
  # 1. Database Service (MySQL)
  - type: web
    name: hcms-db
    env: docker
    dockerContext: ./Developments/BE
    dockerfilePath: ../../mysql.Dockerfile # We'll create this to run MySQL as a web service
    plan: starter
    region: singapore
    envVars:
      - key: MYSQL_DATABASE
        value: hcms
      - key: MYSQL_ROOT_PASSWORD
        generateValue: true
      - key: MYSQL_USER
        value: hcms_user
      - key: MYSQL_PASSWORD
        generateValue: true
    disk:
      name: mysql-data
      mountPath: /var/lib/mysql
      sizeGB: 1

  # 2. Backend Service (Spring Boot)
  - type: web
    name: hcms-backend
    env: docker
    dockerContext: ./Developments/BE
    dockerfilePath: Dockerfile
    plan: starter
    region: singapore
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SPRING_FLYWAY_ENABLED
        value: "true"
      - key: JWT_SECRET
        generateValue: true
      - key: DB_USERNAME
        fromService:
          name: hcms-db
          type: web
          property: envVar:MYSQL_USER
      - key: DB_PASSWORD
        fromService:
          name: hcms-db
          type: web
          property: envVar:MYSQL_PASSWORD
      - key: SPRING_DATASOURCE_URL
        value: jdbc:mysql://hcms-db:3306/hcms?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&charset=utf8mb4

  # 3. Frontend Service (React)
  - type: web
    name: hcms-frontend
    env: docker
    dockerContext: ./Developments/FE/FE_2
    dockerfilePath: Dockerfile
    plan: starter
    region: singapore
    envVars:
      - key: VITE_API_BASE_URL
        value: https://hcms-backend.onrender.com/api/v1
